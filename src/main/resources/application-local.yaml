spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wingstars?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 2001
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      auto-commit: true
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: WingStarsHikariCP

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
#Application properties
wingstars:
  jwtSecret: makeSuperSecretStringThatSoDifficultToGuessAndSoLongThatNoOneCanRemember1000WordsXRQmTFFJ95m359028m5235b259n02qbnq56
  jwtRefreshTokenSecret: makeSuperSecretStringThatSoDifficultToGuessAndSoLongThatNoOneCanRemember1000WordsXRQmTFFJ95m359028m5235b259n02qbnq56
  jwtExpiration: 3600000  #miliseconds
  jwtExpirationRefreshToken: 43200000 #miliseconds
  allowed-origins: >
    http://localhost:3000,
    http://localhost:4000